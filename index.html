<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Tree</title>
  <!-- Relative path so it works on Live Server and GitHub Pages alike. -->
  <link rel="stylesheet" href="css/styles.css?v=27" />
</head>
<body>
  <div id="app">
    <!-- LEFT / MAIN: the SVG tree diagram -->
    <main id="stage">
      <div id="controls">
        <button id="btn-whole" type="button" class="btn" hidden>↩ Whole tree</button>
        <button id="btn-back-branch" type="button" class="btn" hidden>↩ Back to branch</button>
        <span id="breadcrumb" class="breadcrumb">Whole tree</span>
      </div>

      <!-- The tree is drawn into this SVG by js/TreeDiagram.js -->
      <!-- viewBox is wider than the 1000x1000 drawing area so the side labels
           have margin. It stays centered on (500,500), which the camera math
           in TreeDiagram.js relies on. -->
      <svg id="tree" class="tree level-1"
           viewBox="-120 0 1240 1000"
           preserveAspectRatio="xMidYMid meet"
           role="img" aria-label="Interactive Reading Tree diagram"></svg>
    </main>

    <!-- RIGHT: the detail panel (filled in by js/DetailPanel.js) -->
    <aside id="panel" class="panel" aria-live="polite"></aside>
  </div>

  <!-- type="module" lets us use import/export; works over Live Server + Pages. -->
  <script type="module" src="js/main.js?v=27"></script>
</body>
</html>
